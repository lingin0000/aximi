version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16  # PostgreSQL 16 with pgvector extension
    container_name: banju-db
    environment:
      POSTGRES_USER: banju
      POSTGRES_PASSWORD: banju_secret
      POSTGRES_DB: banju
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banju"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: banju-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
